apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: dragonfly-operator
      sourceRef:
        kind: HelmRepository
        name: dragonfly-operator
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: dragonfly-operator-system
